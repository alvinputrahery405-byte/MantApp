        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    if (i === retries - 1) throw new Error(`Status: ${response.status}`);
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // --- MATH RENDERER, UPLOAD & STREAMING LOGIC ---

        function handleChatImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const max_dim = 800; // Kompresi agar base64 tidak berat
                        
                        if (width > height && width > max_dim) {
                            height *= max_dim / width;
                            width = max_dim;
                        } else if (height > max_dim) {
                            width *= max_dim / height;
                            height = max_dim;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        currentChatImage = canvas.toDataURL('image/jpeg', 0.6); 
                        
                        const previewCont = document.getElementById('chat-image-preview-container');
                        const previewImg = document.getElementById('chat-image-preview');
                        if (previewCont && previewImg) {
                            previewImg.src = currentChatImage;
                            previewCont.classList.remove('hidden');
                        }
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function removeChatImage() {
            currentChatImage = null;
            const previewCont = document.getElementById('chat-image-preview-container');
            const fileInput = document.getElementById('chat-image-upload');
            if (previewCont) previewCont.classList.add('hidden');
            if (fileInput) fileInput.value = '';
        }
        
        // Memaksa render format MathJax secara menyeluruh pada kontainer
        function renderAllMath() {
            if (window.MathJax && window.MathJax.typesetPromise) {
                const container = document.getElementById('chat-container');

                }
            }
        }

            const el = document.getElementById(`msg-${msgIndex}`);

            let currentText = "";
            const chunkSize = 3; 
            
            for (let i = 0; i < fullText.length; i += chunkSize) {
                currentText += fullText.substring(i, i + chunkSize);
                el.innerHTML = currentText.replace(/\n/g, '<br>') + '<span class="inline-block w-1.5 h-4 ml-1 bg-blue-500 animate-pulse"></span>';
                
                const container = document.getElementById('chat-container');
                if(container) container.scrollTop = container.scrollHeight;
                
                await new Promise(r => setTimeout(r, 15)); 
            }
            
            // Format penuh setelah ketik selesai
            if (typeof marked !== 'undefined') {
                el.innerHTML = marked.parse(fullText);
                if (window.MathJax && window.MathJax.typesetPromise) {
                    MathJax.typesetPromise([el]).then(() => {
                        const container = document.getElementById('chat-container');
                        if(container) container.scrollTop = container.scrollHeight;
                    });
                }
            } else {
                el.innerHTML = fullText;
            }
        }

        function checkRateLimit() {
            const now = Date.now();
            if (now - userRateLimit.timestamp > 60000) { 
                userRateLimit = { count: 1, timestamp: now };
                localStorage.setItem('mantapp_ratelimit', JSON.stringify(userRateLimit));
                return true;
            }
            if (userRateLimit.count >= 5) {
                return false;
            }
            userRateLimit.count++;
            localStorage.setItem('mantapp_ratelimit', JSON.stringify(userRateLimit));
            return true;
        }

        function clearChat() {
            chatMessages = [

            ];

            changeTab('tanya-ai', false);
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            
            // Cek apakah teks atau gambar ada yang diisi
            if(!text && !currentChatImage) return;

            if(!checkRateLimit()) {
                showModal('Limit Tercapai', 'Kamu bertanya terlalu cepat! Tunggu 1 menit ya (Limit: 5 Pesan/Menit).', '⏳');
                return;
            }
            
            // Simpan gambar & teks di pesan pengguna
            chatMessages.push({ role: 'user', text: text, image: currentChatImage });
            input.value = '';
            
            // Bersihkan uploadan gambar setelah dikirim
            currentChatImage = null; 
            
            changeTab('tanya-ai', false);

            // Indikator loading AI
            const aiMsgIndex = chatMessages.length;
            chatMessages.push({ role: 'ai', text: '', isLoading: true });
            changeTab('tanya-ai', false);

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const contents = chatMessages
                    .filter(m => !m.isLoading && (m.text !== '' || m.image))
                    .map(m => {
                        let parts = [];
                        if (m.text) parts.push({ text: m.text });
                        if (m.image) {
                            let base64Data = m.image.split(',')[1];
                            let mimeType = m.image.match(/data:(.*?);/)[1];
                            parts.push({ inlineData: { mimeType: mimeType, data: base64Data } });
                        }
                        return { role: m.role === 'ai' ? 'model' : 'user', parts: parts };
                    });
                
                const payload = {
                    contents: contents,
                    systemInstruction: {
                        parts: [{ text: "Kamu adalah Tutor AI MantApp Premium, ahli matematika tingkat dewa. ATURAN WAJIB:\n1. JIKA diberikan GAMBAR/FOTO, baca dengan teliti angka dan teks di dalam gambar tersebut untuk menyelesaikannya.\n2. SESUAIKAN GAYA JAWABAN: Jika pertanyaan berupa soal hitungan, perhitungan, atau persamaan matematis langsung, SELESAIKAN SECARA LANGSUNG (jangan membuat model cerita/permisalan). NAMUN JIKA pertanyaan berupa SOAL CERITA, maka langkah pertama WAJIB ubah menjadi MODEL MATEMATIKA (Misal: 'Misalkan $x$ = ...').\n3. WAJIB gunakan format LaTeX untuk SEMUA rumus, variabel, dan angka matematika. Gunakan $...$ untuk inline, dan $$...$$ untuk blok rumus.\n4. Jelaskan langkah demi langkah secara logis dan tepat.\n5. Bahasa santai, ramah, memotivasi, gunakan sapaan 'kamu'." }]
                    }
                };

                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const aiResponse = data.candidates[0].content.parts[0].text;
                
                chatMessages[aiMsgIndex] = { role: 'ai', text: aiResponse, isLoading: false };
                localStorage.setItem(getHistoryKey(), JSON.stringify(chatMessages)); 
                
                changeTab('tanya-ai', false); 
                setTimeout(() => {
                    renderAllMath(); 
                    streamResponse(aiResponse, aiMsgIndex); 
                }, 100);

            } catch (error) {
                chatMessages[aiMsgIndex] = { role: 'ai', text: 'Waduh, koneksi ke otak AI sedang gangguan nih. Coba tanya lagi ya!', isLoading: false };
                changeTab('tanya-ai', false);
            }
        }

        // --- NAVIGATION & MODAL SYSTEM ---

        function changeTab(tabName, isMainNav = true) {
            const contentArea = document.getElementById('content-area');
            const navBar = document.getElementById('main-bottom-nav');
            const fab = document.getElementById('main-fab');
            
            if (tabName === 'login') {
                if(navBar) navBar.classList.add('hidden');
                if(fab) fab.classList.add('hidden');
            } else {
                if(navBar) navBar.classList.remove('hidden');
                if(fab) fab.classList.remove('hidden');
            }
            
            if (isMainNav && tabName !== 'login') {
                currentHistory = [];
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('text-[#1E3A8A]');
                    btn.classList.add('text-gray-400');
                });
                const activeNav = document.getElementById(`nav-${tabName}`);
                if (activeNav) {
                    activeNav.classList.remove('text-gray-400');
                    activeNav.classList.add('text-[#1E3A8A]');
                }
            }

            currentActiveTab = tabName;
            contentArea.style.opacity = 0; 
            
            setTimeout(() => {
                if (tabName === 'home') contentArea.innerHTML = renderHome();
                else if (tabName === 'materi') contentArea.innerHTML = renderMateri();
                else if (tabName === 'kuis') contentArea.innerHTML = renderKuisList();
                else if (tabName === 'kuis-detail') contentArea.innerHTML = renderKuisDetail();
                else if (tabName === 'tanya-ai') contentArea.innerHTML = renderTanyaAI();
                else if (tabName === 'profile') contentArea.innerHTML = renderProfile();
                else if (tabName === 'materi-detail') contentArea.innerHTML = renderMateriDetail();
                else if (tabName === 'edit-profile') contentArea.innerHTML = renderEditProfile();
                else if (tabName === 'notifikasi') contentArea.innerHTML = renderNotifikasi();
                else if (tabName === 'bantuan') contentArea.innerHTML = renderBantuan();
                else if (tabName === 'login') contentArea.innerHTML = renderLogin();
                
                contentArea.scrollTop = 0;
                contentArea.style.opacity = 1; 
                
                // Pemicu Render MathJax khusus halaman yang memiliki output LaTeX
                if(tabName === 'tanya-ai') {
                    const chatContainer = document.getElementById('chat-container');
                    if(chatContainer) chatContainer.scrollTop = chatContainer.scrollHeight;
                    setTimeout(renderAllMath, 50); 
                } else if (tabName === 'materi-detail' || tabName === 'kuis-detail') {
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        setTimeout(() => MathJax.typesetPromise([contentArea]), 50);
                    }
                }
            }, 150);
        }
